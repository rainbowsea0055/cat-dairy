<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>像素小猫日记本</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fef8ee;
      --bg-warm: #f5ecda;
      --surface: #fffaf2;
      --surface-card: #ffffff;
      --accent: #d87040;
      --accent-hover: #c05828;
      --accent-light: #f5dfc8;
      --pink: #d86080;
      --green: #5aaa48;
      --text: #4a3828;
      --text-mid: #7a6850;
      --text-muted: #b0a088;
      --border: #e5d8c8;
      --border-light: #f0e8d8;
      --danger: #c84830;
      --gold: #d8a830;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Serif SC', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image:
        radial-gradient(circle at 20% 80%, rgba(216,112,64,0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(216,96,128,0.03) 0%, transparent 50%);
    }

    /* ===== 顶部 ===== */
    header {
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border-bottom: 3px solid var(--border);
      box-shadow: 0 2px 12px rgba(80,50,20,0.04);
      position: relative;
      z-index: 10;
      flex-wrap: wrap;
    }

    .logo-paw {
      font-size: 20px;
      filter: grayscale(0.3);
    }

    header h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .header-stats {
      margin-left: auto;
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .stat-badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text-muted);
      background: var(--bg-warm);
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid var(--border-light);
    }

    .stat-badge .num {
      color: var(--accent);
    }

    /* ===== 主体 ===== */
    .app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ===== 左侧列表 ===== */
    .sidebar {
      width: 310px;
      min-width: 310px;
      background: var(--surface);
      border-right: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 16px 18px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-light);
    }

    .sidebar-header .count {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--text-muted);
    }

    .btn-new {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      cursor: pointer;
      transition: all 0.12s ease;
      box-shadow: 0 3px 0 #a04820;
      position: relative;
      top: 0;
    }

    .btn-new:hover {
      background: var(--accent-hover);
      top: 1px;
      box-shadow: 0 2px 0 #a04820;
    }

    .btn-new:active {
      top: 3px;
      box-shadow: none;
    }

    .entry-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px;
    }

    .entry-list::-webkit-scrollbar { width: 4px; }
    .entry-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .entry-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.12s ease;
      margin-bottom: 2px;
      border: 2px solid transparent;
      opacity: 0;
      animation: slideIn 0.3s ease forwards;
    }

    .entry-item:hover {
      background: var(--bg-warm);
    }

    .entry-item.active {
      background: var(--accent-light);
      border-color: var(--accent);
    }

    .entry-item .cat-thumb-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .entry-item canvas.cat-thumb {
      image-rendering: pixelated;
      display: block;
      transition: transform 0.2s ease;
      filter: drop-shadow(1px 2px 0 rgba(80,50,20,0.08));
    }

    .entry-item:hover canvas.cat-thumb {
      transform: scale(1.08) rotate(-3deg);
    }

    .special-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      font-size: 10px;
      animation: sparkle 1.5s ease-in-out infinite;
    }

    .entry-item .entry-info {
      flex: 1;
      min-width: 0;
    }

    .entry-item .entry-date {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .entry-item .entry-preview {
      font-size: 13px;
      color: var(--text-mid);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-weight: 300;
    }

    .entry-item .cat-meta {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      color: var(--text-muted);
      margin-top: 3px;
      opacity: 0.7;
    }

    /* ===== 空状态 ===== */
    .empty-state {
      text-align: center;
      padding: 40px 20px 30px;
      color: var(--text-muted);
      font-weight: 300;
      font-size: 14px;
      line-height: 2;
    }

    .empty-state canvas {
      image-rendering: pixelated;
      margin-bottom: 14px;
      filter: drop-shadow(2px 3px 0 rgba(80,50,20,0.1));
      animation: float 3s ease-in-out infinite;
    }

    .empty-state .hint {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--accent);
      margin-top: 6px;
      display: block;
    }

    /* ===== 右侧编辑区 ===== */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .cat-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 12px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
      border-bottom: 2px solid var(--border-light);
      position: relative;
    }

    .cat-display canvas#editor-cat {
      image-rendering: pixelated;
      filter: drop-shadow(3px 4px 0 rgba(80,50,20,0.12));
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      cursor: default;
      transition: transform 0.3s ease;
    }

    .cat-display canvas#editor-cat:hover {
      transform: scale(1.06) rotate(2deg);
    }

    .cat-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--accent);
      margin-top: 8px;
    }

    .cat-detail {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--text-muted);
      margin-top: 4px;
      opacity: 0.6;
    }

    .special-star {
      position: absolute;
      top: 12px;
      right: 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--gold);
      animation: sparkle 1.5s ease-in-out infinite;
    }

    .editor-toolbar {
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border-bottom: 1px solid var(--border-light);
    }

    .editor-date {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--text);
      padding: 6px 10px;
      border: 2px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .editor-date:focus {
      outline: none;
      border-color: var(--accent);
    }

    .editor-actions {
      display: flex;
      gap: 8px;
    }

    .btn-save {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: 4px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      cursor: pointer;
      transition: all 0.12s ease;
      box-shadow: 0 3px 0 #a04820;
      position: relative;
      top: 0;
    }

    .btn-save:hover {
      background: var(--accent-hover);
      top: 1px;
      box-shadow: 0 2px 0 #a04820;
    }

    .btn-save:active {
      top: 3px;
      box-shadow: none;
    }

    .btn-delete {
      background: transparent;
      color: var(--danger);
      border: 2px solid var(--danger);
      padding: 8px 12px;
      border-radius: 4px;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      cursor: pointer;
      transition: all 0.12s ease;
      opacity: 0.6;
    }

    .btn-delete:hover {
      background: var(--danger);
      color: #fff;
      opacity: 1;
    }

    .editor-body {
      flex: 1;
      padding: 24px 32px;
      overflow-y: auto;
    }

    .editor-body textarea {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
      line-height: 2;
      color: var(--text);
      background: transparent;
      font-weight: 300;
    }

    .editor-body textarea::placeholder {
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* ===== 提示 ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: var(--bg);
      padding: 10px 24px;
      border-radius: 6px;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== 爪印 ===== */
    .paw-print {
      position: fixed;
      pointer-events: none;
      z-index: 99;
      opacity: 0;
      animation: pawFloat 1.2s ease-out forwards;
    }

    @keyframes pawFloat {
      0%   { opacity: 0.8; transform: translateY(0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translateY(-100px) scale(0.4) rotate(25deg); }
    }

    /* ===== 星星 ===== */
    @keyframes sparkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.7); }
    }

    /* ===== 动画 ===== */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes popIn {
      0%   { transform: scale(0.3); opacity: 0; }
      70%  { transform: scale(1.08); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    @keyframes blink {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: 0; }
    }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .app { flex-direction: column; }
      .sidebar {
        width: 100%;
        min-width: 100%;
        max-height: 44vh;
        border-right: none;
        border-bottom: 2px solid var(--border);
      }
      .editor-body { padding: 18px; }
      header { padding: 14px 16px; }
      header h1 { font-size: 11px; }
      .cat-display { padding: 16px; }
      .cat-display canvas#editor-cat {
        width: 128px !important;
        height: 128px !important;
      }
      .header-stats { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <span class="logo-paw">🐾</span>
    <h1>像素小猫日记</h1>
    <div class="header-stats">
      <span class="stat-badge">猫咪 <span class="num" id="stat-total">0</span></span>
      <span class="stat-badge">花色 <span class="num" id="stat-breeds">0</span></span>
    </div>
  </header>

  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="count" id="entry-count">0 只小猫</span>
        <button class="btn-new" onclick="createNewEntry()">+ 新日记</button>
      </div>
      <div class="entry-list" id="entry-list">
        <div class="empty-state">
          <canvas id="empty-cat" width="64" height="64"></canvas>
          还没有日记呢<br>
          <span class="hint">点击 + 新日记 开始吧</span>
        </div>
      </div>
    </div>

    <div class="editor-area" id="editor-area" style="display:none;">
      <div class="cat-display">
        <span class="special-star" id="special-star" style="display:none;">★ 限定</span>
        <canvas id="editor-cat" width="192" height="192"></canvas>
        <div class="cat-label" id="editor-cat-name"></div>
        <div class="cat-detail" id="editor-cat-detail"></div>
      </div>
      <div class="editor-toolbar">
        <input type="date" class="editor-date" id="editor-date">
        <div class="editor-actions">
          <button class="btn-delete" onclick="deleteEntry()">删除</button>
          <button class="btn-save" onclick="saveEntry()">保存</button>
        </div>
      </div>
      <div class="editor-body">
        <textarea id="editor-text" placeholder="今天发生了什么有趣的事呢……&#10;&#10;写完保存后，你的小猫就会出现在左边列表里 ✨"></textarea>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ========================================
    //  像素小猫生成器 v2 — 3600+ 种组合
    // ========================================

    const CAT_PALETTES = [
      { name:'橘猫',   body:'#f0a030', stripe:'#c87818', ear:'#f8c878', nose:'#e85858', pad:'#e89850', eye:'#282828', collar:'#e85858' },
      { name:'灰虎斑', body:'#a8a8a8', stripe:'#787878', ear:'#c8c8c8', nose:'#d88888', pad:'#909090', eye:'#282828', collar:'#5898d8' },
      { name:'奶牛猫', body:'#f0e8d8', stripe:'#d8d0c0', ear:'#f8f0e8', nose:'#e85858', pad:'#e0d8c8', eye:'#282828', collar:'#e85878' },
      { name:'狸花猫', body:'#c8a058', stripe:'#886830', ear:'#d8b878', nose:'#d88888', pad:'#b89048', eye:'#38a838', collar:'#d85838' },
      { name:'三花猫', body:'#f0e0c8', stripe:'#e85030', ear:'#f8f0e8', nose:'#e85858', pad:'#e0d0b8', eye:'#282828', collar:'#e85878' },
      { name:'暹罗猫', body:'#f0e0d0', stripe:'#604838', ear:'#f8f0e8', nose:'#d88888', pad:'#806050', eye:'#3888d8', collar:'#d8a830' },
      { name:'蓝猫',   body:'#8898a8', stripe:'#687888', ear:'#a0b0c0', nose:'#d88888', pad:'#788898', eye:'#a0c030', collar:'#d8a830' },
      { name:'黑猫',   body:'#383838', stripe:'#282828', ear:'#484848', nose:'#d88888', pad:'#303030', eye:'#d0c028', collar:'#e8a830' },
    ];

    const PATTERNS  = ['solid','tabby','tuxedo','bicolor','spotted','point'];
    const EXPRESSIONS = ['normal','happy','sleepy','surprised','content'];
    const ACCESSORIES = ['none','collar','bow','hat','glasses'];
    const BODY_TYPES  = ['normal','chubby','thin'];

    const CAT_NAMES = [
      '小橘','团子','豆豆','咪咪','花花','奶糖','布丁','芝麻',
      '丸子','年糕','麻薯','汤圆','糯米','蛋挞','可乐','奶茶',
      '小灰','煤球','雪球','胖橘','小鱼','饼干','棉花','拿铁',
      '摩卡','抹茶','桃子','柚子','栗子','饭团','酱油','味噌',
      '小白','阿呆','肥波','大福','仙贝','秋刀鱼','柴鱼','小春',
      '初夏','深秋','寒冬','薄荷','桂花','杏仁','核桃','花生',
      '南瓜','地瓜','芋头','芒果','荔枝','樱桃','柠檬','蓝莓',
      '菠萝','草莓','西瓜','哈密','榴莲','山竹','木瓜','杨桃',
    ];

    // Seeded PRNG
    function mulberry32(a) {
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        var t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      }
    }

    function getCatName(id) {
      return CAT_NAMES[mulberry32(parseInt(id) ^ 0x5DEECE66)() * CAT_NAMES.length | 0];
    }

    function getCatInfo(id) {
      const r = mulberry32(parseInt(id));
      const breed = CAT_PALETTES[r() * CAT_PALETTES.length | 0];
      const pattern = PATTERNS[r() * PATTERNS.length | 0];
      const expression = EXPRESSIONS[r() * EXPRESSIONS.length | 0];
      const accessory = ACCESSORIES[r() * ACCESSORIES.length | 0];
      const bodyType = BODY_TYPES[r() * BODY_TYPES.length | 0];
      const isSpecial = r() < 0.06;
      return { breed, pattern, expression, accessory, bodyType, isSpecial };
    }

    function drawPixelCat(canvas, id, scale) {
      const ctx = canvas.getContext('2d');
      const S = scale || 4;
      const G = 16;
      canvas.width = G * S;
      canvas.height = G * S;
      canvas.style.width = (G * S) + 'px';
      canvas.style.height = (G * S) + 'px';
      ctx.imageSmoothingEnabled = false;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const rng = mulberry32(parseInt(id));
      const breed = CAT_PALETTES[rng() * CAT_PALETTES.length | 0];
      const pattern = PATTERNS[rng() * PATTERNS.length | 0];
      const expression = EXPRESSIONS[rng() * EXPRESSIONS.length | 0];
      const accessory = ACCESSORIES[rng() * ACCESSORIES.length | 0];
      const bodyType = BODY_TYPES[rng() * BODY_TYPES.length | 0];
      const isSpecial = rng() < 0.06;
      const hasBlush = rng() > 0.5;

      function px(x, y, c) {
        if (x < 0 || x >= G || y < 0 || y >= G || !c) return;
        ctx.fillStyle = c;
        ctx.fillRect(x * S, y * S, S, S);
      }

      function rect(x1, y1, x2, y2, c) {
        for (let y = y1; y <= y2; y++)
          for (let x = x1; x <= x2; x++) px(x, y, c);
      }

      const bc = breed.body, sc = breed.stripe, ec = breed.ear;

      // ===== 特殊猫背景光晕 =====
      if (isSpecial) {
        ctx.fillStyle = 'rgba(255,220,100,0.08)';
        ctx.beginPath();
        ctx.arc(G*S/2, G*S/2, G*S*0.45, 0, Math.PI*2);
        ctx.fill();
      }

      // ===== 耳朵 =====
      px(2, 0, bc); px(3, 0, bc);
      px(12, 0, bc); px(13, 0, bc);
      px(2, 1, bc); px(3, 1, bc);
      px(12, 1, bc); px(13, 1, bc);
      px(2, 2, ec); px(3, 2, ec);
      px(12, 2, ec); px(13, 2, ec);

      // ===== 头部 =====
      rect(3, 2, 12, 2, bc);
      rect(2, 3, 13, 3, bc);
      rect(2, 4, 13, 4, bc);
      rect(2, 5, 13, 5, bc);
      rect(3, 6, 12, 6, bc);
      rect(4, 7, 11, 7, bc);

      // ===== 身体 =====
      if (bodyType === 'chubby') {
        rect(2, 8, 13, 8, bc);
        rect(1, 9, 14, 9, bc);
        rect(1, 10, 14, 10, bc);
        rect(1, 11, 14, 11, bc);
        rect(2, 12, 13, 12, bc);
      } else if (bodyType === 'thin') {
        rect(4, 8, 11, 8, bc);
        rect(4, 9, 11, 9, bc);
        rect(4, 10, 11, 10, bc);
        rect(4, 11, 11, 11, bc);
        rect(4, 12, 11, 12, bc);
      } else {
        rect(3, 8, 12, 8, bc);
        rect(2, 9, 13, 9, bc);
        rect(2, 10, 13, 10, bc);
        rect(2, 11, 13, 11, bc);
        rect(3, 12, 12, 12, bc);
      }

      // ===== 腿 & 爪 =====
      const lx = bodyType === 'thin' ? [5, 6, 9, 10] : bodyType === 'chubby' ? [3, 4, 11, 12] : [4, 5, 10, 11];
      rect(lx[0], 13, lx[1], 13, bc);
      rect(lx[2], 13, lx[3], 13, bc);
      rect(lx[0], 14, lx[1], 14, breed.pad);
      rect(lx[2], 14, lx[3], 14, breed.pad);

      // ===== 尾巴 =====
      px(14, 11, bc); px(15, 10, bc); px(15, 9, bc); px(15, 8, bc);

      // ===== 花纹 =====
      if (pattern === 'tabby') {
        for (let x = 4; x <= 11; x++) { px(x, 3, sc); px(x, 5, sc); }
        for (let y = 9; y <= 11; y++) {
          const sx = bodyType === 'thin' ? 5 : bodyType === 'chubby' ? 2 : 3;
          const ex = bodyType === 'thin' ? 10 : bodyType === 'chubby' ? 13 : 12;
          for (let x = sx; x <= ex; x++) if ((x + y) % 3 !== 0) px(x, y, sc);
        }
        // 额头 M 纹
        px(6, 2, sc); px(7, 2, sc); px(9, 2, sc); px(10, 2, sc);
      } else if (pattern === 'tuxedo') {
        rect(5, 7, 10, 7, '#ffffff');
        const bs = bodyType === 'thin' ? 5 : bodyType === 'chubby' ? 2 : 3;
        const be = bodyType === 'thin' ? 10 : bodyType === 'chubby' ? 13 : 12;
        rect(bs, 8, be, 8, '#ffffff');
        rect(bs+1, 9, be-1, 9, '#ffffff');
        rect(6, 3, 9, 3, '#ffffff');
        rect(6, 4, 9, 4, '#ffffff');
      } else if (pattern === 'bicolor') {
        const patches = [[4,2,7,4],[10,2,12,4],[3,9,6,11],[10,8,13,11],[7,12,9,12]];
        patches.forEach(([x1,y1,x2,y2]) => {
          if (rng() > 0.3) rect(x1, y1, x2, y2, sc);
        });
      } else if (pattern === 'spotted') {
        const spots = [[5,3],[10,3],[4,5],[11,5],[6,9],[9,9],[5,11],[10,11],[7,10],[8,10]];
        spots.forEach(([x,y]) => { if (rng() > 0.25) px(x, y, sc); });
      } else if (pattern === 'point') {
        rect(2, 0, 3, 2, sc); rect(12, 0, 13, 2, sc);
        rect(2, 3, 4, 5, sc); rect(11, 3, 13, 5, sc);
        const lx2 = bodyType === 'thin' ? [5,6,9,10] : bodyType === 'chubby' ? [3,4,11,12] : [4,5,10,11];
        rect(lx2[0], 13, lx2[1], 14, sc);
        rect(lx2[2], 13, lx2[3], 14, sc);
        px(14, 11, sc); px(15, 10, sc); px(15, 9, sc); px(15, 8, sc);
      }

      // ===== 表情 =====
      if (expression === 'normal') {
        rect(4, 4, 5, 4, breed.eye);
        rect(10, 4, 11, 4, breed.eye);
        px(4, 3, '#ffffff'); px(10, 3, '#ffffff');
        px(7, 5, breed.nose);
        px(6, 6, breed.nose); px(8, 6, breed.nose);
      } else if (expression === 'happy') {
        px(4, 3, breed.eye); px(5, 4, breed.eye); px(4, 4, breed.eye);
        px(10, 3, breed.eye); px(11, 4, breed.eye); px(10, 4, breed.eye);
        px(7, 5, breed.nose);
        px(5, 6, breed.eye); px(6, 6, breed.eye); px(7, 6, breed.nose);
        px(8, 6, breed.eye); px(9, 6, breed.eye);
      } else if (expression === 'sleepy') {
        px(4, 4, breed.eye); px(5, 4, breed.eye); px(6, 4, breed.eye);
        px(10, 4, breed.eye); px(9, 4, breed.eye); px(11, 4, breed.eye);
        px(7, 5, breed.nose);
        px(6, 6, breed.nose); px(8, 6, breed.nose);
      } else if (expression === 'surprised') {
        rect(4, 3, 5, 4, breed.eye);
        rect(10, 3, 11, 4, breed.eye);
        px(4, 3, '#ffffff'); px(10, 3, '#ffffff');
        px(4, 4, '#282828'); px(10, 4, '#282828');
        px(7, 5, breed.nose);
        px(6, 6, breed.eye); px(7, 6, breed.nose); px(8, 6, breed.eye);
        px(7, 7, breed.eye);
      } else if (expression === 'content') {
        px(4, 4, breed.eye); px(5, 4, breed.eye);
        px(10, 4, breed.eye); px(11, 4, breed.eye);
        px(7, 5, breed.nose);
        px(6, 6, breed.nose); px(8, 6, breed.nose);
      }

      // 腮红
      if (hasBlush) {
        px(3, 5, '#f0a0a0'); px(12, 5, '#f0a0a0');
      }

      // 胖猫圆脸
      if (bodyType === 'chubby') {
        px(1, 5, bc); px(14, 5, bc);
        px(1, 6, bc); px(14, 6, bc);
        if (hasBlush) { px(1, 5, '#f0a0a0'); px(14, 5, '#f0a0a0'); }
      }

      // ===== 配饰 =====
      if (accessory === 'collar' || accessory === 'bow') {
        rect(5, 7, 10, 7, breed.collar);
        px(7, 8, '#d0a830');
        px(7, 9, '#e8c040');
      }
      if (accessory === 'bow') {
        px(5, 7, '#e04060'); px(4, 7, '#e04060');
        px(9, 7, '#e04060'); px(10, 7, '#e04060');
        px(6, 6, '#e04060'); px(8, 6, '#e04060');
        px(7, 7, '#c03050');
      }
      if (accessory === 'hat') {
        rect(5, 0, 10, 0, '#483828');
        rect(6, -1, 9, -1, '#483828');
        rect(7, -2, 8, -2, '#483828');
        rect(5, 0, 10, 0, '#d8a830');
      }
      if (accessory === 'glasses') {
        rect(3, 4, 6, 4, '#484848');
        rect(3, 3, 3, 3, '#484848');
        rect(6, 3, 6, 3, '#484848');
        rect(9, 4, 12, 4, '#484848');
        rect(9, 3, 9, 3, '#484848');
        rect(12, 3, 12, 3, '#484848');
        px(7, 3, '#484848'); px(8, 3, '#484848');
        px(2, 3, '#484848'); px(13, 3, '#484848');
      }

      // ===== 特殊猫闪光 =====
      if (isSpecial) {
        const sparkles = [[1,1],[14,1],[1,14],[14,14],[7,0],[8,0]];
        sparkles.forEach(([x,y]) => px(x, y, '#f0d848'));
      }
    }

    // ========================================
    //  日记数据
    // ========================================

    function getEntries() {
      const d = localStorage.getItem('pixel-cat-diary-v2');
      return d ? JSON.parse(d) : [];
    }

    function saveEntries(entries) {
      localStorage.setItem('pixel-cat-diary-v2', JSON.stringify(entries));
    }

    let currentEntryId = null;

    function init() {
      renderList();
      const emptyCat = document.getElementById('empty-cat');
      if (emptyCat) drawPixelCat(emptyCat, '42', 4);
    }

    // ========================================
    //  列表渲染
    // ========================================

    function renderList() {
      const entries = getEntries();
      const listEl = document.getElementById('entry-list');
      const countEl = document.getElementById('entry-count');
      const statTotal = document.getElementById('stat-total');
      const statBreeds = document.getElementById('stat-breeds');

      countEl.textContent = entries.length + ' 只小猫';
      statTotal.textContent = entries.length;

      // 统计花色
      const breedSet = new Set();
      entries.forEach(e => {
        const info = getCatInfo(e.id);
        breedSet.add(info.breed.name);
      });
      statBreeds.textContent = breedSet.size + '/8';

      if (entries.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <canvas id="empty-cat" width="64" height="64"></canvas>
            还没有日记呢<br>
            <span class="hint">点击 + 新日记 开始吧</span>
          </div>`;
        const c = document.getElementById('empty-cat');
        if (c) drawPixelCat(c, '42', 4);
        return;
      }

      const sorted = [...entries].sort((a, b) => new Date(b.date) - new Date(a.date));

      listEl.innerHTML = sorted.map((entry, i) => {
        const isActive = entry.id === currentEntryId;
        const preview = entry.content
          ? entry.content.substring(0, 50).replace(/\n/g, ' ')
          : '（空白日记）';
        const info = getCatInfo(entry.id);
        const dateStr = formatDateShort(entry.date);
        const catName = getCatName(entry.id);

        return `
          <div class="entry-item ${isActive ? 'active' : ''}"
               onclick="openEntry('${entry.id}')"
               style="animation-delay: ${i * 0.03}s">
            <div class="cat-thumb-wrap">
              <canvas class="cat-thumb" data-id="${entry.id}" width="56" height="56"></canvas>
              ${info.isSpecial ? '<span class="special-badge">⭐</span>' : ''}
            </div>
            <div class="entry-info">
              <div class="entry-date">${dateStr}</div>
              <div class="entry-preview">${escapeHtml(preview)}</div>
              <div class="cat-meta">${catName} · ${info.breed.name} · ${getPatternName(info.pattern)}</div>
            </div>
          </div>`;
      }).join('');

      listEl.querySelectorAll('.cat-thumb').forEach(canvas => {
        drawPixelCat(canvas, canvas.dataset.id, 4);
      });
    }

    function getPatternName(p) {
      const map = { solid:'纯色', tabby:'虎斑', tuxedo:'燕尾服', bicolor:'双色', spotted:'斑点', point:'重点色' };
      return map[p] || p;
    }

    function getExpressionName(e) {
      const map = { normal:'正常', happy:'开心', sleepy:'困困', surprised:'惊讶', content:'满足' };
      return map[e] || e;
    }

    function getAccessoryName(a) {
      const map = { none:'无', collar:'项圈', bow:'蝴蝶结', hat:'帽子', glasses:'眼镜' };
      return map[a] || a;
    }

    function getBodyTypeName(b) {
      const map = { normal:'标准', chubby:'圆滚滚', thin:'苗条' };
      return map[b] || b;
    }

    // ========================================
    //  日记操作
    // ========================================

    function createNewEntry() {
      const today = new Date().toISOString().split('T')[0];
      const entries = getEntries();

      const newEntry = {
        id: Date.now().toString(),
        date: today,
        content: ''
      };

      entries.push(newEntry);
      saveEntries(entries);
      currentEntryId = newEntry.id;

      renderList();
      openEditor(newEntry);
    }

    function openEntry(id) {
      const entries = getEntries();
      const entry = entries.find(e => e.id === id);
      if (!entry) return;
      currentEntryId = id;
      renderList();
      openEditor(entry);
    }

    function openEditor(entry) {
      const editorArea = document.getElementById('editor-area');
      const dateInput = document.getElementById('editor-date');
      const textArea = document.getElementById('editor-text');
      const catCanvas = document.getElementById('editor-cat');
      const catLabel = document.getElementById('editor-cat-name');
      const catDetail = document.getElementById('editor-cat-detail');
      const specialStar = document.getElementById('special-star');

      editorArea.style.display = 'flex';
      dateInput.value = entry.date;
      textArea.value = entry.content;
      textArea.focus();

      drawPixelCat(catCanvas, entry.id, 12);

      const info = getCatInfo(entry.id);
      catLabel.textContent = '「 ' + getCatName(entry.id) + ' 」';
      catDetail.textContent =
        info.breed.name + ' · ' +
        getPatternName(info.pattern) + ' · ' +
        getExpressionName(info.expression) + ' · ' +
        getBodyTypeName(info.bodyType) +
        (info.accessory !== 'none' ? ' · ' + getAccessoryName(info.accessory) : '');

      specialStar.style.display = info.isSpecial ? 'block' : 'none';
    }

    function saveEntry() {
      if (!currentEntryId) return;

      const entries = getEntries();
      const index = entries.findIndex(e => e.id === currentEntryId);
      if (index === -1) return;

      entries[index].date = document.getElementById('editor-date').value;
      entries[index].content = document.getElementById('editor-text').value;

      saveEntries(entries);
      renderList();
      showToast('已保存 ✓');
      spawnPaws();
    }

    function deleteEntry() {
      if (!currentEntryId) return;
      if (!confirm('确定要删除这篇日记和它的小猫吗？')) return;

      let entries = getEntries();
      entries = entries.filter(e => e.id !== currentEntryId);
      saveEntries(entries);

      currentEntryId = null;
      document.getElementById('editor-area').style.display = 'none';
      renderList();
      showToast('已删除');
    }

    // ========================================
    //  工具
    // ========================================

    function formatDateShort(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const w = ['日','一','二','三','四','五','六'];
      return (d.getMonth()+1) + '/' + d.getDate() + ' 周' + w[d.getDay()];
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function spawnPaws() {
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'paw-print';
          el.textContent = '🐾';
          el.style.left = (25 + Math.random() * 50) + '%';
          el.style.top = (45 + Math.random() * 35) + '%';
          el.style.fontSize = (16 + Math.random() * 14) + 'px';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 1300);
        }, i * 100);
      }
    }

    // Ctrl+S
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveEntry();
      }
    });

    init();
  </script>
</body>
</html>
